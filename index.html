<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Larson</title>
    <style>
      :root {
        --bg: #f5efe6;
        --panel: rgba(255, 252, 247, 0.82);
        --text: #1f1a17;
        --muted: #5f5247;
        --accent: #9f4f2d;
        --accent-dark: #7d3d22;
        --border: rgba(80, 53, 36, 0.12);
        --shadow: 0 24px 60px rgba(53, 37, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(214, 155, 111, 0.35), transparent 34%),
          radial-gradient(circle at bottom right, rgba(166, 111, 78, 0.2), transparent 30%),
          linear-gradient(135deg, #f8f3eb 0%, #efe4d4 100%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, 100%);
        padding: 56px 44px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: clamp(3rem, 8vw, 5.25rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 18px 0 0;
        max-width: 36rem;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 30px;
        padding: 14px 22px;
        border-radius: 999px;
        background: var(--accent);
        color: #fffaf5;
        font-weight: 700;
        text-decoration: none;
        transition:
          transform 180ms ease,
          background-color 180ms ease;
      }

      a:hover,
      a:focus-visible {
        background: var(--accent-dark);
        transform: translateY(-1px);
      }

      @media (max-width: 640px) {
        main {
          padding: 40px 26px;
          border-radius: 22px;
        }

        p {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Website Designer</p>
      <h1>James Larson</h1>
      <p>
        I design clean, modern websites with clear structure, strong typography, and a polished
        feel.
      </p>
      <a href="https://jameslarson8.github.io/alt1_published_site/">View demo work</a>
    </main>
  </body>
</html>
